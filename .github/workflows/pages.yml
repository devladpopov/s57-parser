name: Deploy demo to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build packages
        run: bun run build

      - name: Build demo bundle
        run: bun demo/build.ts

      - name: Assemble static site
        run: |
          mkdir -p _site/dist _site/charts
          cp demo/index.html _site/
          cp demo/dist/viewer.js _site/dist/
          cp demo/charts/US5MA12M.000 _site/charts/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
